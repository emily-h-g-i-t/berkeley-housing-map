<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  :root{
    --gold: #FDB515;
    --blue: #003262;
    --blue-deep: #001A38;
    --paper: #F7F5F0;
    --ink: #1B1B1B;
    --line: #D9D3C4;
    --card: #FFFFFF;
    --grad-accent: #7A3B69;
    --undergrad-accent: #1E6B52;
    --family-accent: #B24A2E;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;font-family:'Georgia', 'Iowan Old Style', serif;background:var(--paper);color:var(--ink);}
  body{display:flex;flex-direction:column;}

  header{
    background:var(--blue);
    color:white;
    padding:18px 28px;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
    border-bottom:4px solid var(--gold);
  }
  header .brand{display:flex;align-items:baseline;gap:14px;}
  header h1{
    font-family:'Trebuchet MS', 'Helvetica Neue', sans-serif;
    font-weight:800;
    letter-spacing:0.5px;
    font-size:22px;
    margin:0;
  }
  header .tag{
    font-family:'Helvetica Neue', sans-serif;
    font-size:12px;
    color:var(--gold);
    letter-spacing:1.5px;
    text-transform:uppercase;
  }
  header .count{
    font-family:'Helvetica Neue', sans-serif;
    font-size:13px;
    color:#cfe0f2;
  }

  .layout{
    display:flex;
    flex:1;
    min-height:0;
  }

  .sidebar{
    width:340px;
    min-width:280px;
    background:white;
    border-right:1px solid var(--line);
    display:flex;
    flex-direction:column;
    overflow-y:auto;
  }
  .filters{
    padding:20px 20px 10px 20px;
    border-bottom:1px solid var(--line);
  }
  .filters h2{
    font-family:'Helvetica Neue', sans-serif;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:1.5px;
    color:#8a8478;
    margin:0 0 14px 0;
  }
  .filter-group{margin-bottom:16px;}
  .filter-group label{
    font-family:'Helvetica Neue', sans-serif;
    font-size:12.5px;
    font-weight:600;
    display:block;
    margin-bottom:6px;
    color:var(--blue);
  }
  select, input[type=range]{
    width:100%;
    font-family:'Helvetica Neue', sans-serif;
    font-size:13px;
    padding:7px 8px;
    border:1px solid var(--line);
    border-radius:3px;
    background:var(--paper);
    color:var(--ink);
  }
  .chip-row{display:flex;flex-wrap:wrap;gap:6px;}
  .chip{
    font-family:'Helvetica Neue', sans-serif;
    font-size:11.5px;
    padding:5px 10px;
    border:1px solid var(--line);
    border-radius:999px;
    cursor:pointer;
    background:white;
    color:var(--ink);
    user-select:none;
    transition:all .15s;
  }
  .chip.active{
    background:var(--blue);
    color:white;
    border-color:var(--blue);
  }
  .chip:hover{border-color:var(--blue);}
  .price-labels{
    display:flex;
    justify-content:space-between;
    font-family:'Helvetica Neue', sans-serif;
    font-size:11px;
    color:#8a8478;
    margin-top:4px;
  }
  .reset-btn{
    font-family:'Helvetica Neue', sans-serif;
    font-size:12px;
    color:var(--blue);
    background:none;
    border:none;
    text-decoration:underline;
    cursor:pointer;
    padding:0;
    margin-top:6px;
  }

  .list{
    flex:1;
    padding:10px 14px 20px 14px;
  }
  .list h2{
    font-family:'Helvetica Neue', sans-serif;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:1.5px;
    color:#8a8478;
    margin:10px 6px 10px 6px;
  }
  .dorm-card{
    border:1px solid var(--line);
    border-left:4px solid var(--blue);
    border-radius:4px;
    padding:12px 14px;
    margin-bottom:10px;
    cursor:pointer;
    transition:box-shadow .15s, transform .15s;
    background:white;
  }
  .dorm-card:hover{
    box-shadow:0 3px 10px rgba(0,50,98,0.12);
    transform:translateY(-1px);
  }
  .dorm-card.selected{
    background:#EFF5FB;
    border-left-color:var(--gold);
  }
  .dorm-card .name{
    font-weight:700;
    font-size:15px;
    color:var(--blue);
    margin-bottom:3px;
  }
  .dorm-card .meta{
    font-family:'Helvetica Neue', sans-serif;
    font-size:11.5px;
    color:#6b6558;
    margin-bottom:6px;
  }
  .dorm-card .price{
    font-family:'Helvetica Neue', sans-serif;
    font-size:12.5px;
    font-weight:600;
    color:var(--ink);
  }
  .tag-pill{
    display:inline-block;
    font-family:'Helvetica Neue', sans-serif;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.5px;
    padding:2px 7px;
    border-radius:3px;
    color:white;
    margin-top:6px;
  }

  .map-area{
    flex:1;
    position:relative;
  }
  #map{
    height:100%;
    width:100%;
  }

  .leaflet-popup-content-wrapper{
    border-radius:6px;
  }
  .popup-inner{font-family:'Helvetica Neue', sans-serif;max-width:260px;}
  .popup-inner h3{
    font-family:Georgia, serif;
    color:var(--blue);
    margin:0 0 4px 0;
    font-size:16px;
  }
  .popup-inner .row{margin:4px 0;font-size:12.5px;line-height:1.4;}
  .popup-inner .row b{color:#444;}

  .detail-panel{
    position:absolute;
    top:16px;
    right:16px;
    width:320px;
    max-height:calc(100% - 32px);
    overflow-y:auto;
    background:white;
    border-radius:8px;
    box-shadow:0 8px 24px rgba(0,0,0,0.18);
    padding:20px;
    display:none;
    z-index:1000;
  }
  .detail-panel.open{display:block;}
  .detail-panel .close-btn{
    position:absolute;
    top:12px;
    right:14px;
    background:none;
    border:none;
    font-size:20px;
    cursor:pointer;
    color:#999;
    line-height:1;
  }
  .detail-panel h3{
    font-family:Georgia, serif;
    color:var(--blue);
    font-size:20px;
    margin:0 0 4px 0;
    padding-right:20px;
  }
  .detail-panel .addr{
    font-family:'Helvetica Neue', sans-serif;
    font-size:12px;
    color:#8a8478;
    margin-bottom:14px;
  }
  .detail-panel .section{margin-bottom:14px;}
  .detail-panel .section h4{
    font-family:'Helvetica Neue', sans-serif;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:1px;
    color:var(--gold);
    background:var(--blue);
    display:inline-block;
    padding:2px 8px;
    border-radius:3px;
    margin:0 0 6px 0;
  }
  .detail-panel .section p{
    font-family:'Helvetica Neue', sans-serif;
    font-size:13px;
    line-height:1.5;
    margin:0;
    color:var(--ink);
  }

  .legend{
    position:absolute;
    bottom:16px;
    left:16px;
    background:white;
    padding:10px 14px;
    border-radius:6px;
    box-shadow:0 2px 8px rgba(0,0,0,0.12);
    font-family:'Helvetica Neue', sans-serif;
    font-size:11.5px;
    z-index:999;
  }
  .legend .row{display:flex;align-items:center;gap:7px;margin:3px 0;}
  .legend .dot{width:11px;height:11px;border-radius:50%;display:inline-block;}

  @media (max-width: 780px){
    .layout{flex-direction:column;}
    .sidebar{width:100%;max-height:45vh;border-right:none;border-bottom:1px solid var(--line);}
    .map-area{min-height:50vh;}
    .detail-panel{left:16px;width:auto;}
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>CAL HOUSING MAP</h1>
    <span class="tag">UC Berkeley Student Housing Explorer</span>
  </div>
  <span class="count" id="resultCount">19 housing options</span>
</header>

<div class="layout">

  <div class="sidebar">
    <div class="filters">
      <h2>Who's applying?</h2>
      <div class="filter-group">
        <div class="chip-row" id="eligibilityChips"></div>
      </div>

      <h2>Filter</h2>
      <div class="filter-group">
        <label>Housing type</label>
        <div class="chip-row" id="typeChips"></div>
      </div>

      <div class="filter-group">
        <label>Meal plan included</label>
        <div class="chip-row" id="mealChips"></div>
      </div>

      <div class="filter-group">
        <label>Sort by</label>
        <select id="sortSelect">
          <option value="name">Name (A–Z)</option>
          <option value="price">Price (low to high)</option>
          <option value="distance">Distance to campus</option>
        </select>
      </div>

      <button class="reset-btn" id="resetBtn">Reset all filters</button>
    </div>

    <div class="list">
      <h2 id="listLabel">All housing (19)</h2>
      <div id="cardList"></div>
    </div>
  </div>

  <div class="map-area">
    <div id="map"></div>
    <div class="legend">
      <div class="row"><span class="dot" style="background:#1E6B52"></span> Undergraduate</div>
      <div class="row"><span class="dot" style="background:#7A3B69"></span> Graduate</div>
      <div class="row"><span class="dot" style="background:#B24A2E"></span> Family housing</div>
    </div>
    <div class="detail-panel" id="detailPanel">
      <button class="close-btn" id="closeDetail">&times;</button>
      <div id="detailContent"></div>
    </div>
  </div>

</div>

// Classify each hall by broad eligibility category for coloring & filter chips
function classify(d){
  const e = d.eligibility.toLowerCase();
  if(e.includes('married') || e.includes('family') || e.includes('parent')) return 'Family';
  if(e.includes('graduate') && !e.includes('undergraduate')) return 'Graduate';
  if(e.includes('graduate') && e.includes('undergraduate')) return 'Grad + limited undergrad';
  if(e.includes('transfer students only') || e.includes('transfer-only')) return 'Transfer only';
  return 'Undergraduate';
}
function categoryColor(cat){
  if(cat === 'Family') return '#B24A2E';
  if(cat === 'Graduate' || cat === 'Grad + limited undergrad') return '#7A3B69';
  if(cat === 'Transfer only') return '#1E6B52';
  return '#1E6B52';
}

// Parse a representative low price (annual $ or monthly $ *9)
function parsePriceLow(str){
  const monthly = str.match(/\$([\d,]+)\/month/);
  const nums = str.match(/\$([\d,]+)/g);
  if(!nums) return null;
  const vals = nums.map(n => parseInt(n.replace(/[$,]/g,'')));
  let low = Math.min(...vals);
  if(monthly) low = low * 9; // rough academic-year equivalent
  return low;
}

DATA.forEach(d => {
  d._cat = classify(d);
  d._priceLow = parsePriceLow(d.price_range_academic_year);
  d._lat = parseFloat(d.latitude);
  d._lng = parseFloat(d.longitude);
});

// ---------- Map setup ----------
const map = L.map('map', {scrollWheelZoom:true}).setView([37.8709, -122.2650], 14);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors',
  maxZoom: 19
}).addTo(map);

let markers = {};
let activeCardId = null;

function makeMarker(d, idx){
  const color = categoryColor(d._cat);
  const icon = L.divIcon({
    className: '',
    html: `<div style="width:16px;height:16px;border-radius:50%;background:${color};border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.4);"></div>`,
    iconSize:[16,16],
    iconAnchor:[8,8]
  });
  const marker = L.marker([d._lat, d._lng], {icon}).addTo(map);
  marker.bindPopup(popupHTML(d));
  marker.on('click', () => openDetail(idx));
  return marker;
}

function popupHTML(d){
  return `<div class="popup-inner">
    <h3>${d.name}</h3>
    <div class="row"><b>Price:</b> ${d.price_range_academic_year}</div>
    <div class="row"><b>Room types:</b> ${d.room_types}</div>
    <div class="row"><b>Eligibility:</b> ${d.eligibility}</div>
  </div>`;
}

function rebuildMarkers(list){
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  list.forEach((d) => {
    const idx = DATA.indexOf(d);
    markers[idx] = makeMarker(d, idx);
  });
}

// ---------- Filter state ----------
const state = {
  eligibility: 'All',
  type: 'All',
  meal: 'All',
  sort: 'name'
};

const eligibilityOptions = ['All', 'Undergraduate', 'Graduate', 'Grad + limited undergrad', 'Transfer only', 'Family'];
const typeOptions = ['All', 'Residence hall', 'Apartment'];
const mealOptions = ['All', 'Yes', 'No'];

function isResidenceHall(d){
  return d.room_types.toLowerCase().includes('suite') && !d.room_types.toLowerCase().includes('apartment') || d.name.toLowerCase().includes('hall') || d.name.startsWith('Unit') || d.name.includes('Foothill') || d.name.includes('Stern') || d.name.includes('Clark Kerr') || d.name.includes('Martinez');
}

function buildChips(containerId, options, stateKey){
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  options.forEach(opt => {
    const chip = document.createElement('div');
    chip.className = 'chip' + (state[stateKey] === opt ? ' active' : '');
    chip.textContent = opt;
    chip.onclick = () => {
      state[stateKey] = opt;
      buildChips(containerId, options, stateKey);
      render();
    };
    container.appendChild(chip);
  });
}

function passesFilter(d){
  if(state.eligibility !== 'All' && d._cat !== state.eligibility) return false;
  if(state.type !== 'All'){
    const isHall = isResidenceHall(d);
    if(state.type === 'Residence hall' && !isHall) return false;
    if(state.type === 'Apartment' && isHall) return false;
  }
  if(state.meal !== 'All' && d.meal_plan_included !== state.meal) return false;
  return true;
}

function sortList(list){
  const arr = [...list];
  if(state.sort === 'price'){
    arr.sort((a,b) => (a._priceLow||999999) - (b._priceLow||999999));
  } else if(state.sort === 'distance'){
    // crude proxy: sort by string length mentions of "block" vs "mile" - fallback to name
    const distScore = d => {
      const s = d.distance_to_campus.toLowerCase();
      const m = s.match(/(\d+(\.\d+)?)/);
      if(s.includes('mile')) return (m?parseFloat(m[1]):3) * 10;
      if(s.includes('block')) return (m?parseFloat(m[1]):1);
      return 0.5;
    };
    arr.sort((a,b) => distScore(a) - distScore(b));
  } else {
    arr.sort((a,b) => a.name.localeCompare(b.name));
  }
  return arr;
}

function render(){
  const filtered = DATA.filter(passesFilter);
  const sorted = sortList(filtered);

  document.getElementById('resultCount').textContent = `${filtered.length} housing option${filtered.length!==1?'s':''}`;
  document.getElementById('listLabel').textContent = `Results (${filtered.length})`;

  const cardList = document.getElementById('cardList');
  cardList.innerHTML = '';
  sorted.forEach(d => {
    const idx = DATA.indexOf(d);
    const card = document.createElement('div');
    card.className = 'dorm-card' + (activeCardId === idx ? ' selected' : '');
    card.innerHTML = `
      <div class="name">${d.name}</div>
      <div class="meta">${d.distance_to_campus}</div>
      <div class="price">${d.price_range_academic_year}</div>
      <span class="tag-pill" style="background:${categoryColor(d._cat)}">${d._cat}</span>
    `;
    card.onclick = () => openDetail(idx);
    cardList.appendChild(card);
  });

  rebuildMarkers(sorted);
}

function openDetail(idx){
  activeCardId = idx;
  const d = DATA[idx];
  const panel = document.getElementById('detailPanel');
  const content = document.getElementById('detailContent');
  content.innerHTML = `
    <h3>${d.name}</h3>
    <div class="addr">${d.address}</div>

    <div class="section">
      <h4>Eligibility</h4>
      <p>${d.eligibility}</p>
    </div>
    <div class="section">
      <h4>Price (academic year)</h4>
      <p>${d.price_range_academic_year}<br>Meal plan included: ${d.meal_plan_included}</p>
    </div>
    <div class="section">
      <h4>Room types</h4>
      <p>${d.room_types}</p>
    </div>
    <div class="section">
      <h4>Style</h4>
      <p>${d.style}</p>
    </div>
    <div class="section">
      <h4>Amenities</h4>
      <p>${d.amenities}</p>
    </div>
    <div class="section">
      <h4>Dining</h4>
      <p>${d.dining_hall}</p>
    </div>
    <div class="section">
      <h4>Theme programs</h4>
      <p>${d.theme_programs}</p>
    </div>
    <div class="section">
      <h4>Distance to campus</h4>
      <p>${d.distance_to_campus}</p>
    </div>
  `;
  panel.classList.add('open');
  map.flyTo([d._lat, d._lng], 16, {duration:0.6});
  if(markers[idx]) markers[idx].openPopup();
  render();
}

document.getElementById('closeDetail').onclick = () => {
  document.getElementById('detailPanel').classList.remove('open');
  activeCardId = null;
  render();
};

document.getElementById('sortSelect').onchange = (e) => {
  state.sort = e.target.value;
  render();
};

document.getElementById('resetBtn').onclick = () => {
  state.eligibility = 'All';
  state.type = 'All';
  state.meal = 'All';
  state.sort = 'name';
  document.getElementById('sortSelect').value = 'name';
  buildChips('eligibilityChips', eligibilityOptions, 'eligibility');
  buildChips('typeChips', typeOptions, 'type');
  buildChips('mealChips', mealOptions, 'meal');
  render();
};

buildChips('eligibilityChips', eligibilityOptions, 'eligibility');
buildChips('typeChips', typeOptions, 'type');
buildChips('mealChips', mealOptions, 'meal');
render();
</script>
